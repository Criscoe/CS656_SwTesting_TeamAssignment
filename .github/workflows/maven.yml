name: Java CI with Maven

on:
  push:
    branches: [ "main", "test-automation" ]
  pull_request:
    branches: [ "main", "test-automation" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and run tests
      run: mvn -B clean verify
